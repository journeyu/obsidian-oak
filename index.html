<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian & Oak - Batch Lookup</title>
            <style>
                *, *::before, *::after {
                    box-sizing: border-box;
                    margin: 0;
                    padding: 0;
                }

                body {
                    font-family: 'DM Sans', sans-serif;
                    font-weight: 300;
                    background: #0f0d0b;
                    color: #e8e0d0;
                    padding: 50px;
                    text-align: center;
                    min-height: 100vh;
                }
                /* -- Header -- */
                .oo-header {
                    border-bottom: 1px solid #2a2520;
                    padding: 20px 40px;
                    display: flex;
                    align-items: baseline;
                    gap: 20px;
                }
                .oo-brand {
                    font-family: 'Cormorant Garamond', serif;
                    font-size: 22px;
                    font-weight: 400;
                    color: #e8e0d0;
                    letter-spacing: 0.08em;
                }
                .oo-brand-divider {
                    color: #4a4035;
                }
                .oo.brand-sub {
                    font-size: 11px;
                    color: #6a5f50;
                    letter-spacing: 0.1em;
                    text-transform: uppercase;
                }

                /* -- Hero -- */
                .oo-hero {
                    margin: 0 auto;
                    max-width: 600px;
                    padding: 64px 24px 0;
                    text-align: center;               
                }
                .oo-eyebrow {
                    font-size: 11px;
                    color: #6a5f50;
                    letter-spacing: 0.25em;
                    text-transform: uppercase;
                    margin-bottom: 16px;
                    color: #7a6e5c;
                }
                .oo.title {
                    font-family: 'Cormorant Garamond', serif;
                    font-size: clamp(36px, 6vw, 52px);
                    font-weight: 300;
                    color: #f08d8d;
                    margin-bottom: 14px;
                    line-height: 1.1;
                }
                .oo-title-em {
                    font-style: italic;
                    color: #e8a97a;
                }
                .oo-subtitle {
                    font-size: 14px;
                    color: #7a6e5c;
                    line-height: 1.7;
                    margin-bottom: 40px;
                    font-weight: 300;
                }
                /* -- Search -- */
                .oo-form {
                    display: flex;
                    border: 1px solid #3a3025;
                    border-radius: 4px;
                    overflow: hidden;
                    background: #161310;
                    transition: border-color 0.2s;
                }
                .oo-form:focus-within {
                    border-color: #c8a97a;
                }
                .oo-input {
                    flex: 1;
                    padding: 16px 20px;
                    font-size: 15px;
                    font-family: 'DM Sans', sans-serif;
                    color: #e8e0d0;
                    background: transparent;
                    border: none;
                    outline: none;
                    letter-spacing: 0.05em;
                }
                .oo-input::placeholder {
                    color: #4a4035;
                }
                .oo-btn {
                    padding: 0 24px;
                    background: #c8a97a;
                    color: #0f0d0b;
                    font-size: 15px;
                    font-family: 'DM Sans', sans-serif;
                    font-weight: 500;
                    letter-spacing: 0.05em;
                    text-transform: uppercase;
                    border: none;
                    cursor: pointer;
                    transition: background-color 0.2s;
                    white-space: nowrap;
                }
                .oo-btn:hover {
                    background-color: #dbbf8e;
                }
                .oo-btn:active {
                    background-color: #b89668;
                }
                .oo-btn:disabled {
                    background-color: #3a3025;
                    cursor: not-allowed;
                    color: #6a5f50;
                }

                /* -- Example pills -- */
                .oo-examples {
                    display: flex;
                    gap: 8px;
                    justify-content: center;
                    margin-top: 40px;
                    flex-wrap: wrap;
                }
                .oo-ex-btn {
                    padding: 5px 12px;
                    background: transparent;
                    color: #6a5f50;
                    font-size: 11px;
                    font-family: 'DM Sans', sans-serif;
                    letter-spacing: 0.12em;
                    border-radius: 2px;
                    border: 1px solid #2a2520;
                    cursor: pointer;
                    transition: all 0.15s;
                }
                .oo-ex-btn:hover {
                    background-color: #c8a97a;
                    color: #c8a97a;
                }

                /* -- Status -- */
                .oo-status {
                    max-width: 600px;
                    margin: 40px auto 0;
                    padding: 0 24px;
                    text-align: center;
                }
                .oo-dots {
                    display: inline-flex;
                    gap: 6px;
                }
                .oo-dot {
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    background-color: #c8a97a;
                    animation: oo-bounce 1.5s ease-in-out infinite;
                }
                .oo-dot:nth-child(2) {
                    animation-delay: 0.15s;
                }
                .oo-dot:nth-child(3) {
                    animation-delay: 0.3s;
                }
                @keyframes oo-bounce {
                    0%, 80%, 100% {
                        transform: translateY(0);
                    }
                    40% {
                        transform: translateY(0); opacity: 0.4;
                    }
                    40% {
                        transform: translateY(-6px); opacity: 1;
                }
                .oo-notfound {
                    font-size: 14px;
                    font-family: 'Cormorant Garamond', serif;
                    font-size: 18px;
                    font-style: italic;
                    color: #6a5f50;
                }
                .oo-notfound-hint {
                    font-size: 13px;
                    color: #4a4035;
                    margin-top: 8px;
                }

                /* -- Result -- */
                .oo-result {
                    margin: 48px auto 80px;
                    max-width: 700px;
                    padding: 0 24px;
                    background: #161310;
                    animation: oo-fadeup 0.45s ease both;
                }
                @keyframes oo-fadeup {
                    from {
                        opacity: 1;
                        transform: translateY(0);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
                .oo-result-header {
                    border-top: 1px solid #3a3025;
                    font-family: 'Cormorant Garamond', serif;
                    font-size: 22px;
                    color: #f08d8d;
                    margin-bottom: 16px;
                }
            </style>
</head>
<body>
    <div class="box">
        <h1>Obsidian & Oak - Batch Lookup</h1>
        <p>Enter a query to see the provenance of your data.</p>
        <input type="text" id="query" placeholder="Enter your query here...">
        <button onclick="showProvenance()">Show Provenance</button>
        <div id="result"></div>
    </div>

    <script>
        function showProvenance() {
            const query = document.getElementById('query').value;
            // Simulate fetching provenance data based on the query
            const provenanceData = `Provenance for "${query}":\n- Source: Data Source A\n- Processed by: Oak Processor\n- Timestamp: ${new Date().toLocaleString()}`;
            document.getElementById('result').innerText = provenanceData;
        }
    </script>
</body>
</html>

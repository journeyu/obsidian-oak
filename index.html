<script>
    // Replace these with your actual IDs
    const API_TOKEN = '17dfddc89c13a9fb453fec48aa6140810fdcb12ea18b47af98346bd5ffc1fa25';
    const COLLECTION_ID = '6a014264e69761b517e03796';

    async function findBatch() {
        const input = document.getElementById('batchId').value;
        const display = document.getElementById('result');
        display.innerHTML = "Searching...";

        try {
            // We use the proxy to get around the CORS "policeman"
            const response = await fetch(`https://corsproxy.io/?https://api.webflow.com/v2/collections/${COLLECTION_ID}/items`, {
                headers: { 
                    'Authorization': `Bearer ${API_TOKEN}`,
                    'accept': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error("HTTP error! status: " + response.status);
            }

            const data = await response.json();
            
            // Look for the item where the name matches the user input
            const match = data.items.find(item => item.fieldData.name === input);

            if (match) {
                display.innerHTML = `
                    <hr>
                    <p><b>Kiln:</b> ${match.fieldData['kiln-type']}</p>
                    <p><b>Temp:</b> ${match.fieldData['peak-temperature']}°F</p>
                    <p><b>Artisan ID:</b> ${match.fieldData['artisan']}</p>
                `;
            } else {
                display.innerHTML = "❌ Batch not found. Check your spelling!";
            }

        } catch (error) {
            // This is the part that was causing the error before
            console.error("The error is:", error);
            display.innerHTML = "⚠️ Error: " + error.message;
        }
    } // This bracket closes the findBatch function
</script>

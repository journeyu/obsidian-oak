<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian & Oak | Provenance Tool</title>
    <style>
        /* This makes sure you actually see something on the screen */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f1ee; 
            color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #1a1a1a; }
        input { 
            width: 80%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            font-size: 1rem;
        }
        button { 
            background-color: #2c2c2c; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #000; }
        #result { margin-top: 25px; text-align: left; line-height: 1.6; }
        .error { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Obsidian & Oak</h1>
        <p>Enter your Batch ID below:</p>
        <input type="text" id="batchInput" placeholder="e.g., B-101">
        <br>
        <button onclick="findBatch()">Verify Provenance</button>
        
        <div id="result">
            <!-- Data will appear here -->
        </div>
    </div>

    <script>
        // 1. PUT YOUR REAL KEYS HERE
        const API_TOKEN = '17dfddc89c13a9fb453fec48aa6140810fdcb12ea18b47af98346bd5ffc1fa25'; 
        const COLLECTION_ID = '6a014264e69761b517e03796';

        async function findBatch() {
            const userInput = document.getElementById('batchInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!userInput) {
                resultDiv.innerHTML = "<p class='error'>Please enter a Batch ID.</p>";
                return;
            }

            resultDiv.innerHTML = "<em>Searching the archives...</em>";

            try {
                // Using the CORS proxy to allow the connection
                const url = `https://corsproxy.io/?https://api.webflow.com/v2/collections/${COLLECTION_ID}/items`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Connection failed (Status: ${response.status})`);
                }

                const data = await response.json();
                
                // We look for a match where the Name field equals what the user typed
                const match = data.items.find(item => 
                    item.fieldData.name.toLowerCase() === userInput.toLowerCase()
                );

                if (match) {
                    resultDiv.innerHTML = `
                        <div style="border-top: 1px solid #eee; padding-top: 15px;">
                            <strong>Batch ID:</strong> ${match.fieldData.name}<br>
                            <strong>Kiln Type:</strong> ${match.fieldData['kiln-type'] || 'N/A'}<br>
                            <strong>Peak Temp:</strong> ${match.fieldData['peak-temperature'] || 'N/A'}°F<br>
                            <strong>Artisan:</strong> ${match.fieldData['artisan'] || 'Hand-thrown'}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = "<p class='error'>Batch ID not found in our records.</p>";
                }

            } catch (err) {
                console.error("Technical Error:", err);
                resultDiv.innerHTML = `<p class='error'>Error: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
